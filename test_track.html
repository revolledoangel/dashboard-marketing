<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tracking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .result {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #0056b3; }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>🧪 Test de Tracking</h1>
    
    <div>
        <label>Token del Embudo:</label>
        <input type="text" id="token" placeholder="Pega aquí el token de tu embudo">
        
        <label>Nombre del Evento:</label>
        <input type="text" id="nombre" value="test_page" placeholder="Ejemplo: home, producto, etc.">
        
        <label>Tipo:</label>
        <select id="tipo">
            <option value="visita">Visita</option>
            <option value="evento">Evento</option>
        </select>
    </div>
    
    <div style="margin-top: 20px;">
        <button onclick="enviarTest()">🚀 Enviar Test</button>
        <button onclick="limpiar()">🧹 Limpiar</button>
    </div>
    
    <div id="resultado"></div>
    
    <script>
        function enviarTest() {
            const token = document.getElementById('token').value;
            const nombre = document.getElementById('nombre').value;
            const tipo = document.getElementById('tipo').value;
            
            if (!token) {
                mostrarResultado('❌ Debes ingresar un token', 'error');
                return;
            }
            
            mostrarResultado('⏳ Enviando petición...', '');
            
            const trackUrl = window.location.origin + window.location.pathname.replace('test_track.html', 'track.php');
            
            console.log('Enviando a:', trackUrl);
            console.log('Datos:', { token, tipo, nombre, url: window.location.href });
            
            fetch(trackUrl, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: token,
                    tipo: tipo,
                    nombre: nombre,
                    url: window.location.href
                })
            })
            .then(response => {
                console.log('Status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Respuesta:', data);
                if (data.success) {
                    mostrarResultado('✅ ÉXITO!\n\n' + JSON.stringify(data, null, 2), 'success');
                } else {
                    mostrarResultado('❌ ERROR\n\n' + JSON.stringify(data, null, 2), 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                mostrarResultado('❌ ERROR DE RED\n\n' + error.message, 'error');
            });
        }
        
        function mostrarResultado(mensaje, clase) {
            const div = document.getElementById('resultado');
            div.innerHTML = `<div class="result ${clase}">${mensaje}</div>`;
        }
        
        function limpiar() {
            document.getElementById('resultado').innerHTML = '';
        }
    </script>
</body>
</html>
